<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Designed CV Template | MX VENTURE LAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=platform-1" />
</head>
<body class="cv-template-page">
  <main class="cv-template-shell">
    <article class="regular-cv designed-cv cv-document" id="regularCV">
      <header class="regular-cv-header">
        <div>
          <p class="cv-label">Designed CV</p>
          <h2 id="regName">Candidate Name</h2>
          <p id="regTitle">Target Role</p>
        </div>
        <p id="regContact">Email | Phone | Location</p>
      </header>
      <section>
        <h3>Summary</h3>
        <p id="regSummary">Professional summary goes here.</p>
      </section>
      <section>
        <h3>Skills</h3>
        <div class="cv-skill-list" id="regSkills">
          <span>Skill 1</span>
          <span>Skill 2</span>
          <span>Skill 3</span>
        </div>
      </section>
      <section>
        <h3>Experience</h3>
        <p id="regExperience">Experience details go here.</p>
      </section>
      <section>
        <h3>Education</h3>
        <p id="regEducation">Education details go here.</p>
      </section>
    </article>
  </main>
</body>
</html>
