<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATS CV Template | MX VENTURE LAB</title>
  <link rel="stylesheet" href="style.css?v=platform-1" />
</head>
<body class="cv-template-page">
  <main class="cv-template-shell">
    <article class="ats-cv cv-document" id="atsCV">
      <header>
        <h2 id="atsName">Candidate Name</h2>
        <p id="atsTitle">Target Role</p>
        <p id="atsContact">Email | Phone | Location</p>
      </header>
      <section>
        <h3>SUMMARY</h3>
        <p id="atsSummary">Professional summary goes here.</p>
      </section>
      <section>
        <h3>SKILLS</h3>
        <p id="atsSkills">Skill 1, Skill 2, Skill 3</p>
      </section>
      <section>
        <h3>EXPERIENCE</h3>
        <p id="atsExperience">Experience details go here.</p>
      </section>
      <section>
        <h3>EDUCATION</h3>
        <p id="atsEducation">Education details go here.</p>
      </section>
    </article>
  </main>
</body>
</html>
